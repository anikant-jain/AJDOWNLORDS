<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AJ Downloader</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --red: #ff2d55;
  --pink: #c13584;
  --dark: #05050d;
  --card-bg: rgba(12,12,22,0.75);
  --border: rgba(255,255,255,0.08);
  --muted: rgba(255,255,255,0.38);
}

body {
  background: var(--dark);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

#bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
}

.vignette {
  position: fixed;
  inset: 0;
  z-index: 1;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(5,5,13,0.85) 100%);
  pointer-events: none;
}

.scanlines {
  position: fixed;
  inset: 0;
  z-index: 2;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
}

.wrapper {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 460px;
  padding: 20px;
  animation: floatIn 0.9s cubic-bezier(0.16,1,0.3,1) both;
}

@keyframes floatIn {
  from { opacity:0; transform: translateY(40px) scale(0.97); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

.header { text-align: center; margin-bottom: 28px; }

.badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: rgba(255,45,85,0.1);
  border: 1px solid rgba(255,45,85,0.25);
  border-radius: 100px;
  padding: 5px 15px;
  margin-bottom: 18px;
  font-size: 11px;
  font-weight: 500;
  color: var(--red);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.badge-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--red);
  box-shadow: 0 0 8px var(--red);
  animation: blink 1.8s ease-in-out infinite;
}

@keyframes blink {
  0%,100% { opacity:1; box-shadow: 0 0 8px var(--red); }
  50%      { opacity:0.3; box-shadow: none; }
}

h1 {
  font-family: 'Syne', sans-serif;
  font-size: 46px;
  font-weight: 800;
  color: #fff;
  line-height: 1;
  letter-spacing: -0.04em;
  margin-bottom: 10px;
}

.grad-text {
  background: linear-gradient(135deg, #ff2d55 0%, #ff6b35 50%, #c13584 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  background-size: 200% 200%;
  animation: gradShift 4s ease infinite;
}

@keyframes gradShift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.subtitle {
  color: var(--muted);
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 0.05em;
}

.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 26px;
  padding: 26px;
  backdrop-filter: blur(32px) saturate(180%);
  -webkit-backdrop-filter: blur(32px) saturate(180%);
  position: relative;
  overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.04) inset,
    0 30px 80px rgba(0,0,0,0.6),
    0 0 60px rgba(255,45,85,0.06);
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
}

.card::after {
  content: '';
  position: absolute;
  top: -80px; right: -80px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(255,45,85,0.12) 0%, transparent 70%);
  pointer-events: none;
}

.tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  background: rgba(255,255,255,0.03);
  border-radius: 14px;
  padding: 4px;
  margin-bottom: 20px;
  border: 1px solid var(--border);
}

.tab {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.25s ease;
}

.tab svg { width: 17px; height: 17px; flex-shrink: 0; }

.tab.yt-on {
  background: rgba(255,0,0,0.12);
  color: #ff4f4f;
  box-shadow: 0 0 20px rgba(255,0,0,0.1);
}

.tab.ig-on {
  background: rgba(193,53,132,0.14);
  color: #e065a8;
  box-shadow: 0 0 20px rgba(193,53,132,0.12);
}

.input-wrap { position: relative; margin-bottom: 14px; }

.input-icon {
  position: absolute;
  left: 15px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  pointer-events: none;
  display: flex;
}

.input-icon svg { width: 17px; height: 17px; }

input[type="text"] {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 13px;
  padding: 14px 14px 14px 46px;
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: all 0.2s;
}

input[type="text"]::placeholder { color: rgba(255,255,255,0.22); }

input[type="text"]:focus {
  border-color: rgba(255,45,85,0.45);
  background: rgba(255,255,255,0.06);
  box-shadow: 0 0 0 3px rgba(255,45,85,0.08);
}

.divider {
  display: flex; align-items: center; gap: 10px;
  margin: 0 0 14px;
}
.divider-line { flex:1; height:1px; background: var(--border); }
.divider-text { font-size: 10px; color: rgba(255,255,255,0.18); text-transform: uppercase; letter-spacing: 0.12em; }

.formats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
  margin-bottom: 20px;
}

.fmt-btn {
  display: flex; align-items: center; justify-content: center;
  gap: 6px;
  padding: 11px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.07);
  background: transparent;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.fmt-btn svg { width: 15px; height: 15px; }

.fmt-btn.on {
  border-color: rgba(255,45,85,0.35);
  background: rgba(255,45,85,0.08);
  color: #fff;
  box-shadow: 0 0 14px rgba(255,45,85,0.08);
}

.btn-dl {
  position: relative;
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, #ff2d55 0%, #ff6b35 50%, #c13584 100%);
  background-size: 200% 200%;
  color: #fff;
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.03em;
  cursor: pointer;
  overflow: hidden;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 8px 30px rgba(255,45,85,0.35), 0 0 0 1px rgba(255,255,255,0.08) inset;
  animation: gradShift 4s ease infinite;
}

.btn-dl:hover {
  transform: translateY(-2px);
  box-shadow: 0 14px 40px rgba(255,45,85,0.5), 0 0 0 1px rgba(255,255,255,0.1) inset;
}

.btn-dl:active { transform: translateY(0); }

.btn-dl .shine {
  position: absolute;
  top: 0; left: -100%;
  width: 55%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
  transform: skewX(-20deg);
  transition: left 0.55s ease;
}
.btn-dl:hover .shine { left: 160%; }

.progress-wrap {
  margin-top: 14px;
  display: none;
}
.progress-wrap.show { display: block; animation: floatIn 0.3s ease; }

.prog-bar-bg {
  background: rgba(255,255,255,0.06);
  border-radius: 100px;
  height: 5px;
  overflow: hidden;
  margin-bottom: 8px;
}

.prog-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #ff2d55, #ff6b35, #c13584);
  background-size: 200%;
  border-radius: 100px;
  width: 0%;
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  animation: gradShift 2s linear infinite;
}

.prog-labels {
  display: flex; justify-content: space-between;
  font-size: 11.5px; color: var(--muted);
}

.prog-labels .status { color: #ff7b93; }

.success-box {
  display: none;
  align-items: center;
  gap: 10px;
  background: rgba(52,199,89,0.08);
  border: 1px solid rgba(52,199,89,0.18);
  border-radius: 12px;
  padding: 11px 15px;
  margin-top: 14px;
  font-size: 13px;
  color: #5dd87a;
}
.success-box.show { display: flex; animation: floatIn 0.3s ease; }
.success-box svg { width: 17px; height: 17px; flex-shrink: 0; }

.footer {
  text-align: center;
  margin-top: 18px;
  font-size: 11.5px;
  color: rgba(255,255,255,0.18);
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="vignette"></div>
<div class="scanlines"></div>

<div class="wrapper">
  <div class="header">
    <div class="badge"><div class="badge-dot"></div> by AJ</div>
    <h1>One Click<br><span class="grad-text">Downloader</span></h1>
    <p class="subtitle">YouTube &nbsp;·&nbsp; Instagram &nbsp;·&nbsp; Reels &nbsp;·&nbsp; Shorts</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab yt-on" id="tab-yt" onclick="setTab('yt')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
        YouTube
      </button>
      <button class="tab" id="tab-ig" onclick="setTab('ig')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
        Instagram
      </button>
    </div>

    <div class="input-wrap">
      <span class="input-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      </span>
      <input type="text" id="urlInput" placeholder="Paste YouTube or Instagram link..." />
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">Format</span>
      <div class="divider-line"></div>
    </div>

    <div class="formats">
      <button class="fmt-btn on" id="fmt-mp4" onclick="setFmt('mp4')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        Video (MP4)
      </button>
      <button class="fmt-btn" id="fmt-mp3" onclick="setFmt('mp3')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        Audio (MP3)
      </button>
    </div>

    <form id="dlForm" action="/download" method="POST">
      <input type="hidden" name="site"   id="siteHidden" value="youtube">
      <input type="hidden" name="format" id="fmtHidden"  value="mp4">
      <input type="hidden" name="url"    id="urlHidden">
      <button type="button" class="btn-dl" id="dlBtn" onclick="handleDl(event)">
        <div class="shine"></div>
        &#11015; &nbsp;Download Now
      </button>
    </form>

    <div class="progress-wrap" id="progWrap">
      <div class="prog-bar-bg"><div class="prog-bar-fill" id="progFill"></div></div>
      <div class="prog-labels">
        <span class="status" id="statusTxt">Fetching info...</span>
        <span id="progPct">0%</span>
      </div>
    </div>

    <div class="success-box" id="successBox">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      Done! Check your downloads folder.
    </div>
  </div>

  <div class="footer">For personal &amp; educational use only &nbsp;·&nbsp; Made by AJ</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ── 3D Background ── */
(function() {
  const canvas = document.getElementById('bg-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.z = 5;

  /* Particle field */
  const N = 1800;
  const pos = new Float32Array(N * 3);
  const col = new Float32Array(N * 3);
  const palette = [
    new THREE.Color('#ff2d55'), new THREE.Color('#c13584'),
    new THREE.Color('#ff6b35'), new THREE.Color('#6e40ff'), new THREE.Color('#ffffff'),
  ];

  for (let i = 0; i < N; i++) {
    pos[i*3]   = (Math.random()-.5)*20;
    pos[i*3+1] = (Math.random()-.5)*20;
    pos[i*3+2] = (Math.random()-.5)*20;
    const c = palette[Math.floor(Math.random()*palette.length)];
    col[i*3]=c.r; col[i*3+1]=c.g; col[i*3+2]=c.b;
  }

  const pGeo = new THREE.BufferGeometry();
  pGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  pGeo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  const pMat = new THREE.PointsMaterial({ size:0.045, vertexColors:true, transparent:true, opacity:0.75 });
  const particles = new THREE.Points(pGeo, pMat);
  scene.add(particles);

  /* Wireframe shapes */
  const shapes = [];
  function addShape(geo, color, x, y, z) {
    const mat = new THREE.MeshBasicMaterial({ color, wireframe:true, transparent:true, opacity:0.18 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    mesh.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
    scene.add(mesh);
    shapes.push({ mesh, sx:(Math.random()-.5)*0.003, sy:(Math.random()-.5)*0.003 });
  }

  addShape(new THREE.IcosahedronGeometry(1.8,1), 0xff2d55,  2.5,  1.5, -3);
  addShape(new THREE.OctahedronGeometry(1.2,0),  0xc13584, -3.0, -1.0, -2);
  addShape(new THREE.TorusGeometry(1.0,0.3,8,24),0xff6b35, -2.5,  2.0, -4);
  addShape(new THREE.IcosahedronGeometry(0.7,0), 0x6e40ff,  3.5, -2.5, -3);
  addShape(new THREE.CylinderGeometry(0.5,0.5,1.5,6), 0xff2d55, 0, -3.0, -3.5);

  /* Mouse parallax */
  let mx = 0, my = 0;
  document.addEventListener('mousemove', e => {
    mx = (e.clientX/window.innerWidth  - 0.5)*2;
    my = (e.clientY/window.innerHeight - 0.5)*2;
  });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  let t = 0;
  (function animate() {
    requestAnimationFrame(animate);
    t += 0.005;
    particles.rotation.x += 0.0006;
    particles.rotation.y += 0.0008;
    camera.position.x += (mx*0.4 - camera.position.x)*0.04;
    camera.position.y += (-my*0.3 - camera.position.y)*0.04;
    camera.lookAt(scene.position);
    shapes.forEach(s => {
      s.mesh.rotation.x += s.sx;
      s.mesh.rotation.y += s.sy;
      s.mesh.position.y += Math.sin(t + s.mesh.position.x)*0.003;
    });
    renderer.render(scene, camera);
  })();
})();

/* ── UI Logic ── */
const style = document.createElement('style');
style.textContent = `@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}`;
document.head.appendChild(style);

function setTab(t) {
  document.getElementById('tab-yt').className = 'tab'+(t==='yt'?' yt-on':'');
  document.getElementById('tab-ig').className = 'tab'+(t==='ig'?' ig-on':'');
  document.getElementById('siteHidden').value = t==='yt'?'youtube':'instagram';
  document.getElementById('urlInput').placeholder = t==='yt'
    ? 'Paste YouTube link...'
    : 'Paste Instagram Reel or Post link...';
}

function setFmt(f) {
  document.getElementById('fmt-mp4').className = 'fmt-btn'+(f==='mp4'?' on':'');
  document.getElementById('fmt-mp3').className = 'fmt-btn'+(f==='mp3'?' on':'');
  document.getElementById('fmtHidden').value = f;
}

function spawnParticles(btn) {
  for (let i=0;i<12;i++) {
    const d = document.createElement('div');
    const a = (i/12)*Math.PI*2, dist = 40+Math.random()*30;
    d.style.cssText = `position:absolute;width:5px;height:5px;border-radius:50%;background:${['#ff2d55','#ff6b35','#c13584','#fff'][i%4]};left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none;transition:all 0.6s cubic-bezier(0.25,0.46,0.45,0.94);opacity:1;`;
    btn.appendChild(d);
    requestAnimationFrame(()=>{
      d.style.transform=`translate(calc(-50% + ${Math.cos(a)*dist}px),calc(-50% + ${Math.sin(a)*dist}px)) scale(0)`;
      d.style.opacity='0';
    });
    setTimeout(()=>d.remove(), 700);
  }
}

function handleDl(e) {
  const url = document.getElementById('urlInput').value.trim();
  const inp = document.getElementById('urlInput');
  if (!url) {
    inp.style.borderColor='rgba(255,45,85,0.8)';
    inp.style.animation='shake 0.4s ease';
    inp.style.boxShadow='0 0 0 3px rgba(255,45,85,0.15)';
    setTimeout(()=>{ inp.style.borderColor=''; inp.style.animation=''; inp.style.boxShadow=''; }, 1400);
    return;
  }
  spawnParticles(e.currentTarget);
  document.getElementById('urlHidden').value = url;

  const wrap=document.getElementById('progWrap'), fill=document.getElementById('progFill');
  const pct=document.getElementById('progPct'), stat=document.getElementById('statusTxt');
  document.getElementById('successBox').className='success-box';
  wrap.className='progress-wrap show';
  fill.style.width='0%';

  [
    {p:12,s:'Connecting...',d:0},
    {p:30,s:'Fetching video info...',d:550},
    {p:55,s:'Extracting stream...',d:1100},
    {p:75,s:'Downloading...',d:1700},
    {p:90,s:'Processing file...',d:2300},
    {p:100,s:'Almost done...',d:2800},
  ].forEach(x=>setTimeout(()=>{ fill.style.width=x.p+'%'; pct.textContent=x.p+'%'; stat.textContent=x.s; }, x.d));

  setTimeout(()=>document.getElementById('dlForm').submit(), 3200);
}
</script>
</body>
</html>
